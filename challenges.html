<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Travel quizzes by Vania F. Halim, where each destination unlocks a limited-edition pin.">
<link rel="preconnect" href="https://fonts.googleapis.com">
